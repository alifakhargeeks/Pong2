name = "pong-room-runner"
main = "worker/src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomRunner"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomRunner"]

[env.staging]
name = "pong-room-runner-staging"

[env.production]
name = "pong-room-runner-production"
