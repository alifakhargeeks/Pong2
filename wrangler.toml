name = "pong-room-runner"
main = "worker/src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomRunner"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "RoomsRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomRunner"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RoomsRegistry"]

[env.staging]
name = "pong-room-runner-staging"

[[env.staging.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomRunner"

[[env.staging.durable_objects.bindings]]
name = "REGISTRY"
class_name = "RoomsRegistry"

[env.production]
name = "pong-room-runner-production"

[[env.production.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomRunner"

[[env.production.durable_objects.bindings]]
name = "REGISTRY"
class_name = "RoomsRegistry"
